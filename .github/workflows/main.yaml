name: Matrix Dependency Example

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16, 20]

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install old package
        run: npm install uuid@3

      - name: Run script
        run: node -e "console.log('ok')"
