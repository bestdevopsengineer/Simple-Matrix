name: Matrix Fail Example

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.8, 3.11]

    steps:
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run code
        run: |
          python -c "print('Hello')" 
          python -c "match 1:
            case 1:
              print('match works')"
