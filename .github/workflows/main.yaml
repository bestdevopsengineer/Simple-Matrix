name: 1-Simple Matrix

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [16, 18]

    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Run code
        run: node -e "fetch('https://example.com').then(res => res.text()).then(console.log)"
